<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="favicon.png" />
<title>Jp-Learning</title>
<style>
  :root {
    --bg: #14161a; --panel: #1d2026; --line: #2c313a;
    --fg: #e7e9ee; --mut: #9aa3b2; --acc: #f0584b; --ok: #3ec46d; --warn: #e0a23a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 15px/1.5 system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
  }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 14px; }
  h1 { font-size: 20px; margin: 0; }
  h1 .jp { color: var(--acc); }
  nav { margin-left: auto; display: flex; gap: 6px; }
  nav button { background: none; border: 1px solid var(--line); color: var(--mut); padding: 7px 14px; border-radius: 8px; cursor: pointer; }
  nav button.active { color: var(--fg); border-color: var(--acc); }
  main { max-width: 880px; margin: 0 auto; padding: 24px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px; margin-bottom: 18px; }
  .row { display: flex; gap: 8px; }
  input[type=text] {
    flex: 1; background: var(--bg); border: 1px solid var(--line); color: var(--fg);
    padding: 11px 13px; border-radius: 9px; font-size: 15px;
  }
  input:focus { outline: none; border-color: var(--acc); }
  button.act { background: var(--acc); border: none; color: #fff; padding: 0 18px; border-radius: 9px; cursor: pointer; font-weight: 600; }
  button.act:disabled { opacity: .5; cursor: default; }
  .hint { color: var(--mut); font-size: 13px; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { color: var(--mut); font-weight: 600; font-size: 13px; }
  .jp-cell { font-size: 18px; }
  .pt { color: var(--warn); }
  .en { color: var(--mut); font-size: 13px; }
  .x { color: var(--mut); cursor: pointer; border: none; background: none; font-size: 16px; }
  .x:hover { color: var(--acc); }
  .badge { font-size: 11px; color: var(--mut); }
  /* quiz */
  .card { text-align: center; padding: 30px 18px; }
  .card .prompt { font-size: 44px; margin: 8px 0 4px; }
  .card .romaji { color: var(--mut); font-size: 15px; }
  .reveal { margin-top: 18px; min-height: 26px; font-size: 18px; }
  .reveal .pt { display: block; margin-top: 4px; }
  .feedback.ok { color: var(--ok); }
  .feedback.no { color: var(--acc); }
  .qstats { color: var(--mut); font-size: 13px; text-align: center; margin-top: 14px; }
  .empty { color: var(--mut); text-align: center; padding: 30px; }
  /* quiz direction + multiple choice */
  .qdir { display: flex; gap: 6px; justify-content: center; margin-bottom: 18px; }
  .qopts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
  .qopt { text-align: left; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px;
          background: var(--bg); color: var(--fg); cursor: pointer; font-size: 16px; transition: border-color .1s; }
  .qopt:hover:not(:disabled) { border-color: var(--mut); }
  .qopt.correct { border-color: var(--ok); color: var(--ok); }
  .qopt.wrong { border-color: var(--acc); color: var(--acc); }
  .qopt:disabled { cursor: default; }
  @media (max-width: 560px) { .qopts { grid-template-columns: 1fr; } }
  /* search preview */
  .preview { margin-top: 14px; border: 1px solid var(--line); border-radius: 10px; padding: 14px; background: var(--bg); }
  .preview.miss { border-color: var(--acc); color: var(--acc); }
  .preview .reading { font-size: 24px; }
  .preview .reading .romaji { font-size: 14px; color: var(--mut); margin-left: 8px; }
  .preview .pv-pt { color: var(--warn); margin-top: 6px; font-size: 17px; }
  .preview .pv-en { color: var(--mut); margin-top: 2px; }
  .preview .pv-meta { color: var(--mut); font-size: 12px; margin-top: 6px; }
  .preview .pv-actions { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
  .preview .dupe { color: var(--warn); font-size: 13px; }
  /* categories + filters */
  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip { background: none; border: 1px solid var(--line); color: var(--mut); padding: 5px 11px; border-radius: 20px; cursor: pointer; font-size: 13px; }
  .chip:hover { color: var(--fg); }
  .chip.active { background: var(--acc); border-color: var(--acc); color: #fff; }
  .chip .n { opacity: .6; margin-left: 5px; font-size: 11px; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 12px; border: 1px solid var(--line); color: var(--mut); }
  .tag.pos { color: var(--acc); border-color: var(--acc); }
  .tag.cat { color: var(--warn); border-color: var(--warn); margin-left: 4px; }
  .tag.add { cursor: pointer; border-style: dashed; }
  .preview .pv-pos { font-size: 12px; margin-top: 4px; }
  /* speaker buttons */
  .spk { background: none; border: none; cursor: pointer; font-size: 15px; padding: 0 6px 0 0; opacity: .7; }
  .spk:hover { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1><span class="jp">日本語</span> DB</h1>
  <nav>
    <button id="romajiToggle" title="Swap primary script (kana ⇄ romaji)">あ ⇄ Aa</button>
    <button id="tab-glossary" class="active">Glossary</button>
    <button id="tab-quiz">Quiz</button>
  </nav>
</header>
<main>
  <!-- GLOSSARY VIEW -->
  <section id="view-glossary">
    <div class="panel">
      <div class="row">
        <input id="term" type="text" placeholder="romaji / kana / kanji  (e.g. neko, ねこ, 猫)" autofocus />
        <button id="searchBtn" class="act">Search</button>
      </div>
      <div id="addMsg" class="hint">Search first → preview reading + English + Portuguese, then add to glossary.</div>
      <div id="preview" class="preview" style="display:none"></div>
    </div>
    <div class="panel">
      <div id="filters" class="filters"></div>
      <table>
        <thead><tr>
          <th>Reading</th><th>Meaning</th><th>Category</th><th>JLPT</th><th>Progress</th><th></th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="emptyG" class="empty" style="display:none">Glossary empty. Add a word above.</div>
    </div>
    <datalist id="catList">
      <option value="objects"></option>
      <option value="phrases"></option>
      <option value="greetings"></option>
      <option value="food"></option>
      <option value="places"></option>
      <option value="people"></option>
    </datalist>
  </section>

  <!-- QUIZ VIEW -->
  <section id="view-quiz" style="display:none">
    <div class="panel card">
      <div id="qBody">
        <div class="qdir">
          <button id="dirJp" class="chip">JP → meaning</button>
          <button id="dirEn" class="chip">meaning → JP</button>
          <button id="qRestart" class="chip" title="Reshuffle">↻ shuffle</button>
        </div>
        <div class="prompt" id="qPrompt">—</div>
        <div class="romaji" id="qRomaji"></div>
        <button id="qSpk" class="act" style="background:var(--line);margin-top:10px">🔊 Listen</button>
        <div id="qOptions" class="qopts"></div>
        <div class="reveal" id="qReveal"></div>
        <div class="row" style="justify-content:center;margin-top:14px;gap:10px">
          <button id="qNext" class="act">Next →</button>
        </div>
      </div>
      <div id="qStats" class="qstats"></div>
    </div>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
